name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  DOCKER_HUB_REPO: onesvat/whisper-server

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_tag: ${{ steps.version.outputs.is_tag }}
    steps:
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            IS_TAG="true"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "is_tag=${IS_TAG}" >> $GITHUB_OUTPUT
            echo "Building version: ${VERSION} (from git tag)"
          else
            VERSION=""
            IS_TAG="false"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "is_tag=${IS_TAG}" >> $GITHUB_OUTPUT
            echo "Building from branch: ${GITHUB_REF#refs/heads/}"
          fi

  build-and-push:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Generate Docker tags
        id: tags
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          IS_TAG="${{ needs.prepare.outputs.is_tag }}"
          REPO="${{ env.DOCKER_HUB_REPO }}"
          
          if [[ "$IS_TAG" == "true" ]]; then
            MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1,2)
            TAGS="${REPO}:v${VERSION},${REPO}:${VERSION},${REPO}:${MAJOR_MINOR},${REPO}:latest"
            echo "Generated tags (version $VERSION):"
            echo "$TAGS" | tr ',' '\n'
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
            TAGS="${REPO}:latest"
            echo "Generated tags (branch $BRANCH):"
            echo "$TAGS" | tr ',' '\n'
          fi
          
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify:
    needs: [prepare, build-and-push]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && success()
    steps:
      - name: Notify on success
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          IS_TAG="${{ needs.prepare.outputs.is_tag }}"
          
          if [[ "$IS_TAG" == "true" ]]; then
            echo "✅ Docker image v${VERSION} successfully built and pushed"
            echo "Version tags:"
            echo "  - v${VERSION}, ${VERSION}"
            echo "  - latest"
          else
            echo "✅ Docker image successfully built and pushed from branch"
            echo "Branch tags:"
            echo "  - latest"
          fi