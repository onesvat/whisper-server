services:
  whisper-server:
    build: .
    container_name: whisper-server
    volumes:
      - ./volumes/whisper:/data
      - ./volumes/voices:/data/voices
    environment:
      - TZ=Europe/Istanbul
      - VOICES_DIR=/data/voices
      - SPEAKER_THRESHOLD=0.80
      - VOICE_SCAN_INTERVAL=10
      - WHISPER_MODEL=Systran/faster-whisper-medium
      - WHISPER_LANGUAGE=tr
      - WHISPER_BEAM_SIZE=5
      - WHISPER_COMPUTE_TYPE=int8
      - WHISPER_CPU_THREADS=4
    ports:
      - 10300:10300
      - 8080:8080
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities:
                - gpu
    restart: unless-stopped
